services:
  postgres:
    image: postgres:17-alpine
    container_name: redteam-db
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-redteam}
      POSTGRES_USER: ${POSTGRES_USER:-redteam}
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}"
    volumes:
      - pgdata:/var/lib/postgresql/data
    command:
      - "postgres"
      - "-c"
      - "max_connections=100"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "log_connections=on"
      - "-c"
      - "log_disconnections=on"
      - "-c"
      - "log_min_duration_statement=1000"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-redteam} -d $${POSTGRES_DB:-redteam}"]
      interval: 5s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:latest
    container_name: redteam-adminer
    restart: unless-stopped
    ports:
      - "10003:8080"
    depends_on:
      - postgres

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: redteam-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: "postgresql://${POSTGRES_USER:-redteam}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-redteam}"
      SESSION_SECRET: "${SESSION_SECRET:?SESSION_SECRET is required - generate with: openssl rand -hex 32}"
      TOTP_PENDING_KEY: "${TOTP_PENDING_KEY:?TOTP_PENDING_KEY is required - generate with: openssl rand -hex 32}"
      RESOURCE_MASTER_KEY: "${RESOURCE_MASTER_KEY:?RESOURCE_MASTER_KEY is required - generate with: openssl rand -hex 32}"
      REGISTRATION_MODE: ${REGISTRATION_MODE:-open}
      REGISTRATION_CODE: ${REGISTRATION_CODE:-}
      CAPTCHA_ENABLED: ${CAPTCHA_ENABLED:-false}
      CAPTCHACAT_SITE_KEY: ${CAPTCHACAT_SITE_KEY:-}
      CAPTCHACAT_API_KEY: ${CAPTCHACAT_API_KEY:-}
    volumes:
      - appdata:/app/data
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  appdata:
